name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      # Full-tree ruff has legacy debt (~10k+ style issues). Gate new Track B / Phase 14 paths.
      - name: Ruff (scoped)
        run: |
          ruff check exstreamtv/patterns exstreamtv/models \
            exstreamtv/api/schedule_history.py \
            exstreamtv/utils/async_subprocess.py \
            exstreamtv/services/schedule_snapshot_service.py \
            exstreamtv/services/health_service.py \
            exstreamtv/services/stream_service.py \
            --output-format=concise
      # Unit suite (Track B / hardened paths). Integration under tests/ may need local services.
      - name: Pytest (unit)
        run: pytest tests/unit -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install (npm ci if lockfile present)
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - run: npm run build
